<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Notificações</title>

    <link rel="stylesheet" href="notificacoes.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- topo -->

    <div class="topo">

        <div class="logo-area">

            <h2>GradeSync</h2>

        </div>

        <div class="sair">

            <i class="fa-solid fa-right-from-bracket"></i>

            <a href="#">Sair</a>

        </div>

    </div>

    <!-- conteudo -->

    <div class="conteudo">

        <!-- titulo -->

        <div class="titulo">

            <i class="fa-solid fa-arrow-left"></i>

            <h1>Notificações</h1>

        </div>

        <!-- notificacao -->

        <div class="card-notificacao">

            <!-- texto -->

            <div class="texto-card">

                <h3>Ativar notificações</h3>

                <p>Receba lembretes de aulas e tarefas.</p>

            </div>

            <!-- interruptor -->

            <div class="interruptor-area">

                <div class:"switch">

                    <span class="slider"></span>

                </div>
                
            </div>

        </div>

    </div>

    <!-- aba inferior -->

    <div class="aba-inferior">

        <div class="item-aba">

            <i class="fa-regular fa-calendar"></i>

            <p>Grade</p>

        </div>

        <div class="item-aba">

            <i class="fa-solid fa-book-open"></i>

            <p>Roteiro</p>

        </div>

        <div class="item-aba">

            <i class="fa-regular fa-circle-question"></i>

            <p>Ajuda</p>

        </div>

        <div class="item-aba ativo">

            <i class="fa-solid fa-gear"></i>

            <p>Config</p>

        </div>

    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeSync - Privacidade</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="logo.png" alt="GradeSync Logo">
            <h1>GradeSync</h1>
        </div>
        <button class="logout-btn">
            <span class="material-symbols-outlined">logout</span>
            Sair
        </button>
    </header>

    <main>
        <div class="content-wrapper">
            <div class="page-header">
                <button class="back-btn">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <h2>Privacidade</h2>
            </div>

            <div class="settings-list">
                <div class="setting-item">
                    <div class="setting-info">
                        <span class="setting-title">Localização</span>
                        <span class="setting-subtitle">Não definido</span>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
                
                <div class="setting-item">
                    <div class="setting-info">
                        <span class="setting-title">Câmera</span>
                        <span class="setting-subtitle">Não definido</span>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
                
                <div class="setting-item">
                    <div class="setting-info">
                        <span class="setting-title">Contatos</span>
                        <span class="setting-subtitle">Não definido</span>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
                
                <div class="setting-item">
                    <div class="setting-info">
                        <span class="setting-title">Fotos</span>
                        <span class="setting-subtitle">Não definido</span>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
                
                <div class="setting-item">
                    <div class="setting-info">
                        <span class="setting-title">Arquivos</span>
                        <span class="setting-subtitle">Não definido</span>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="nav-item">
            <span class="material-symbols-outlined">calendar_month</span>
            <span>Grade</span>
        </div>
        <div class="nav-item">
            <span class="material-symbols-outlined">menu_book</span>
            <span>Roteiro</span>
        </div>
        <div class="nav-item">
            <span class="material-symbols-outlined">help_outline</span>
            <span>Ajuda</span>
        </div>
        <div class="nav-item active">
            <span class="material-symbols-outlined">settings</span>
            <span>Config</span>
        </div>
    </footer>
</body>
</html>

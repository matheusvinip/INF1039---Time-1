<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeSync Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page-container">
        <div class="header-section">
            <div class="logo">
                <img src="logo.png" alt="Logo GradeSync">
            </div>
            <h1>GradeSync</h1>
            <p>Automação de grade universitária</p>
        </div>

        <div class="login-card">
            <h2>Entrar</h2>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="seu@email.com">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••">
                        <span class="eye-icon">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M10 3.75C5.625 3.75 1.875 6.875 0 10C1.875 13.125 5.625 16.25 10 16.25C14.375 16.25 18.125 13.125 20 10C18.125 6.875 14.375 3.75 10 3.75ZM10 13.75C7.91667 13.75 6.25 12.0833 6.25 10C6.25 7.91667 7.91667 6.25 10 6.25C12.0833 6.25 13.75 7.91667 13.75 10C13.75 12.0833 12.0833 13.75 10 13.75ZM10 8.125C8.95833 8.125 8.125 8.95833 8.125 10C8.125 11.0417 8.95833 11.875 10 11.875C11.0417 11.875 11.875 11.0417 11.875 10C11.875 8.95833 11.0417 8.125 10 8.125Z" fill="#6C757D"/>
                            </svg>
                        </span>
                    </div>
                </div>
                <a href="#" class="forgot-password">Esqueceu a senha?</a>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <p class="signup-text">Não tem uma conta? <a href="#">Cadastre-se</a></p>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeSync - Recuperar Senha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page-container">
        <div class="header-section">
            <div class="logo">
                <img src="logo.png" alt="Logo GradeSync">
            </div>
            <h1>GradeSync</h1>
            <p>Recuperar senha</p>
        </div>

        <div class="login-card">
            <h2>Esqueceu a senha?</h2>
            <p class="instruction-text">Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>
            
            <form action="#" method="post">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="seu@email.com">
                    </div>
                </div>
                
                <button type="submit" class="btn-primary">Enviar link</button>
            </form>
            
            <div class="back-to-login">
                <a href="#">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Voltar ao login
                </a>
            </div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeSync - Ajuda</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    
<header class="navbar">
    <div class="logo-area">
        <img src="logo.png" alt="Logo GradeSync" class="logo-img">
        <span class="logo-text">GradeSync</span>
    </div>
    <a href="#" class="logout-link">
        &#10142; Sair
    </a>
</header>

    <main class="container">
        <section class="header-title">
            <h1>Ajuda</h1>
            <p>Como podemos te ajudar?</p>
        </section>

        <div class="cards-list">
            
            <div class="card-item">
                <div class="icon-box blue-theme">💬</div>
                <div class="card-info">
                    <h3>Dúvidas Frequentes</h3>
                    <p>Encontre respostas para as perguntas mais comuns</p>
                </div>
            </div>

            <div class="card-item">
                <div class="icon-box green-theme">🎧</div>
                <div class="card-info">
                    <h3>Atendimento</h3>
                    <p>Fale com nossa equipe de suporte</p>
                </div>
            </div>

        </div>
    </main>

    <footer class="bottom-menu">
        <a href="#" class="nav-link">
            <i class="fa fa-calendar" aria-hidden="true"></i>
            <span>Grade</span>
        </a>
        <a href="#" class="nav-link">
            <i class="fa fa-book" aria-hidden="true"></i>
            <span>Roteiro</span>
        </a>
        <a href="#" class="nav-link active">
            <i class="fa fa-question-circle" aria-hidden="true"></i>
            <span>Ajuda</span>
        </a>
        <a href="#" class="nav-link">
            <i class="fa fa-cog" aria-hidden="true"></i>
            <span>Config</span>
        </a>
    </footer>

</body>
</html>

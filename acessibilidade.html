<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acessibilidade</title>
<link rel="stylesheet" href="acessibilidade.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <!--topo-->
    <div class="topo">
        <div class="area_da_logo">
        <h2>GradeSync</h2>
        </div>
        <div class="sair">
            <i class="fa-solid faright-from-bracket"></i>
            <p>Sair</p>
        </div>
    </div>
    <!--conteudo-->
    <div class="conteudo">
        <!--titulo-->
        <div class="titulo">
            <i class="fa-solid fa-arrow-left"></i>
            <h1>Acessibilidade</h1>
        </div>
        <!--cards tamanho-->
        <div class="card_tamanho">
            <p style="font-size: 20px;">Tamanho do texto</p>
            <div class="botoes_tamanho">
                <button class="botao_tamanho">Pequeno</button>
                <button class="botao_tamanho ativo">Padrao</button>
                <button class="botao_tamanho">Grande</button>
                <button class="botao_tamanho">Muito grande</button>
            </div>
        </div>
    </div>
        <!--cards opcoes-->
        <div class="card_opcoes">
            <p>Alto contraste</p>
            <div class="interruptor">
                <span class="bola"></span>
            </div>
        </div>
        <div class="card_opcoes">
            <p>Reduzir animacoes</p>
            <div class="interruptor">
                <span class="bola"></span>
            </div>
        </div>
        <div class="card_opcoes">
            <p>Sublinhar links</p>
            <div class="interruptor">
                <span class="bola"></span>
            </div>
        </div>
        <div class="card_opcoes">
            <p>Fonte para dislexia</p>
            <div class="interruptor">
                <span class="bola"></span>
            </div>
        </div>
        
    <!--aba inferior-->
    <div class="aba_inferior">
        <div class="item_aba">
            <i class="fa-regular fa-calendar"></i>
            <p>Grade</p>
        </div>
        <div class="item_aba">
            <i class="fa-solid fa-book-open"></i>
            <p>Roteiro</p>
        </div>
        <div class="item_aba">
            <i class="fa-regular fa-circle-question"></i>
            <p>Ajuda</p>
        </div>
        <div class="item_aba">
            <div class="ativo_aba">
                <i class="fa-solid fa-gear"></i>
                <p>Config</p>
            </div>
        </div>
    </div>
</body>



</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duvidas Frequentes</title>
<link rel="stylesheet" href="duvidas.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<!--topo-->
<div class="topo">
    <i class="fa-solid fa-arrow-left"></i>
    <h2>Duvidas Frequentes</h2>
</div>
<!--conteudo-->
<div class="caixaconteudo">
    <!--simbolo robo cont-->
    <div class="robo">
        <i class="fa-solid fa-robot"></i>
    </div>
    <div class="conteudotexto">
        <h2>Ola! Como posso ajudar?</h2>
        <p>Pergunte qualquer duvida sobre o GradeSync ou organizacao academica</p>
    </div>
        <!--botoes sugestoes-->
        <div class="botoes">
            <button>Como criar uma grade?</button>
            <button>Como editar meu roteiro de estudo?</button>
            <button>O que sao pre-requisitos?</button>
        </div>
    </div>
</div>
<!--barra de digitacao-->
<div class="barracaixa">
    <div class="barrainput">
        <p class="textoinput">Digite sua duvida...</p>
        <div class="botaoenvia">
            <i class="fa-solid fa-paper-plane"></i>
        </div>
    </div>
</div>
</body>
</html>
